<!DOCTYPE html>
<html>
<head>
    <title>GigShield AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>GigShield AI</h1>
        <p>Income Protection for Delivery Partners</p>

        <div class="card">
            <h3>Enter Details</h3>
            <input id="income" placeholder="Weekly Income (₹)">
            <input id="city" placeholder="City">
            <button onclick="calculatePremium()">Calculate Premium</button>

            <p id="premium"></p>
            <p id="risk"></p>
        </div>

        <div class="card">
            <h3>Check Disruption</h3>
            <button onclick="checkDisruption()">Check Now</button>
            <p id="result"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
